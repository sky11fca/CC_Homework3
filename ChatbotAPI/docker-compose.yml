services:
  api:
    build: .
    container_name: chatbot_api
    ports:
      - "8000:8000"
    environment:
      # This overrides the default localhost so the python client knows where to look
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      # Syncs local code for live reloads during development
      - .:/app

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      # Persist the downloaded models so they aren't lost when the container stops
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    # Automatically pulls the specific model required by chat_service.py
    command: pull llama3.2:1b

volumes:
  ollama_data: