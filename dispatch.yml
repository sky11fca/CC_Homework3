dispatch:
  # Rute către Teammate B (Data & Logic)
  - url: "*/api/items/*"
    service: itemapi

  # Rute către Teammate C (AI & Security)
  - url: "*/api/auth/*"
    service: authapi
  - url: "*/api/chat/*"
    service: chatbotapi

  # Ruta către serviciul tău secundar (Media Processing)
  - url: "*/api/media/*"
    service: mediaapi

  # Orice altceva merge către interfața ta web (Vue)
  - url: "*/*"
    service: default